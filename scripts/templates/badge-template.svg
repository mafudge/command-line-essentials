<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90A4"/>
      <stop offset="100%" style="stop-color:#2C5F7C"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="384" height="234" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="4"/>

  <rect x="20" y="20" width="360" height="210" rx="8" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="1"/>

  <text x="200" y="55" font-family="Arial, sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">{{COURSE_NAME}}</text>

  <text x="200" y="95" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1F2937" text-anchor="middle">Achievement Unlocked</text>

  <text x="200" y="130" font-family="Courier New, monospace" font-size="16" fill="#4A90A4" text-anchor="middle">&gt;_ Terminal Mastery</text>

  <text x="200" y="165" font-family="Arial, sans-serif" font-size="14" fill="#374151" text-anchor="middle">Awarded to: {{STUDENT_NAME}}</text>

  <text x="200" y="195" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF" text-anchor="middle">{{COMPLETION_DATE}}</text>

  <text x="200" y="218" font-family="Arial, sans-serif" font-size="10" fill="#D1D5DB" text-anchor="middle">Issued by Command Line Essentials</text>
