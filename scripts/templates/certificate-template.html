<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate of Completion</title>
    <style>
        @page {
            size: letter landscape;
            margin: 0;
        }
        body {
            font-family: 'Georgia', serif;
            text-align: center;
            margin: 0;
            padding: 40px;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .certificate {
            border: 12px double #2c5aa0;
            padding: 60px 80px;
            max-width: 900px;
            position: relative;
        }
        .border-outer {
            border: 3px solid #2c5aa0;
            padding: 15px;
        }
        .border-inner {
            border: 1px solid #2c5aa0;
            padding: 40px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 42px;
            color: #2c5aa0;
            margin: 20px 0;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            font-style: italic;
        }
        .course-title {
            font-size: 28px;
            color: #333;
            margin: 30px 0;
            font-weight: bold;
        }
        .awarded-to {
            font-size: 16px;
            color: #666;
            margin: 20px 0 5px 0;
        }
        .student-name {
            font-size: 36px;
            color: #2c5aa0;
            margin: 0 0 30px 0;
            font-style: italic;
            border-bottom: 2px solid #2c5aa0;
            padding-bottom: 10px;
            display: inline-block;
            min-width: 300px;
        }
        .date-label {
            font-size: 16px;
            color: #666;
            margin: 20px 0 5px 0;
        }
        .completion-date {
            font-size: 20px;
            color: #333;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="certificate">
        <div class="border-outer">
            <div class="border-inner">
                <div class="logo">[INSTITUTION LOGO]</div>
                <h1>Certificate of Completion</h1>
                <p class="subtitle">This is to certify that</p>
                <p class="awarded-to">Awarded to:</p>
                <p class="student-name">{{STUDENT_NAME}}</p>
                <p class="subtitle">for successfully completing the course</p>
                <p class="course-title">Command Line Essentials</p>
                <p class="date-label">Date of Completion:</p>
                <p class="completion-date">{{COMPLETION_DATE}}</p>
                <div class="footer">Command Line Essentials Program</div>
            </div>
        </div>
    </div>
</body>
</html>
